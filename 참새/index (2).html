<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 예측기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind dark mode configuration
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        @font-face {
            font-family: 'Daum';
            src: local('Daum'), local('Apple SD Gothic Neo'), local('Malgun Gothic'), sans-serif;
            font-style: normal;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .font-daum {
            font-family: 'Daum', 'Noto Sans KR', sans-serif;
            letter-spacing: -0.02em;
            font-style: normal !important;
        }

        .lotto-ball {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.25);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .ball-1 { background: radial-gradient(circle at 30% 30%, #facc15, #ca8a04); }
        .ball-11 { background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb); }
        .ball-21 { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
        .ball-31 { background: radial-gradient(circle at 30% 30%, #94a3b8, #475569); }
        .ball-41 { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); }

        .game-row {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scanning-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .theme-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Theme Toggle Button -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3.5 rounded-2xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700 transition-all hover:scale-110 active:scale-90 z-50 group">
        <div id="theme-icon-container" class="relative w-6 h-6">
            <svg id="moon-icon" class="absolute inset-0 w-6 h-6 text-indigo-600 transition-all duration-500 transform dark:rotate-90 dark:opacity-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
            <svg id="sun-icon" class="absolute inset-0 w-6 h-6 text-yellow-400 transition-all duration-500 transform -rotate-90 opacity-0 dark:rotate-0 dark:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
        </div>
    </button>

    <div class="max-w-md w-full space-y-8 mt-4">
        <header class="text-center">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3 text-blue-600 dark:text-blue-400 font-daum drop-shadow-sm">AI 로또 예측기</h1>
            <p class="text-[11px] tracking-[0.4em] text-slate-400 dark:text-slate-500 font-bold uppercase">Neural Network Probability Engine</p>
        </header>

        <main class="card bg-white dark:bg-slate-900 p-6 rounded-[3rem] shadow-2xl shadow-blue-500/10 border border-slate-100 dark:border-slate-800 theme-transition relative overflow-hidden">
            <div id="loader" class="hidden absolute inset-0 bg-white/90 dark:bg-slate-900/95 z-20 flex flex-col items-center justify-center backdrop-blur-sm">
                <div class="scanning-line"></div>
                <div class="relative w-20 h-20 mb-6">
                    <div class="absolute inset-0 border-4 border-blue-100 dark:border-blue-900/30 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p id="loading-text" class="text-base font-bold text-blue-600 dark:text-blue-400 animate-pulse">패턴 분석 엔진 가동 중...</p>
            </div>

            <div id="result-container" class="space-y-5 min-h-[400px] flex flex-col justify-center">
                <div class="text-center space-y-4 py-12">
                    <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                    </div>
                    <p class="text-slate-400 dark:text-slate-500 text-sm leading-relaxed">
                        최근 200회차 당첨 빈도 및 가중치 분석 준비 완료.<br>
                        <span class="font-bold text-blue-500/80">AI 예측을 시작해 보세요.</span>
                    </p>
                </div>
            </div>

            <button id="generate-btn" onclick="startAnalysis()" class="mt-8 w-full bg-gradient-to-br from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-bold py-5 rounded-2xl transition-all active:scale-[0.97] shadow-xl shadow-blue-600/20 text-lg flex items-center justify-center gap-2 group">
                <span>분석 및 번호 생성</span>
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </button>
        </main>

        <!-- 제휴 문의 섹션 -->
        <section class="card bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-lg border border-slate-100 dark:border-slate-800 theme-transition relative overflow-hidden">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-slate-200">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                </svg>
                제휴 문의하기
            </h2>
            
            <form id="contact-form" action="https://formspree.io/f/xykljnko" method="POST" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" name="name" placeholder="성함/업체명" required class="bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 dark:text-slate-200">
                    <input type="email" name="email" placeholder="이메일 주소" required class="bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 dark:text-slate-200">
                </div>
                <textarea name="message" placeholder="제휴 제안 내용을 입력해주세요." rows="3" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 dark:text-slate-200"></textarea>
                <button type="submit" id="form-submit-btn" class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600 text-slate-600 dark:text-slate-300 font-bold py-3 rounded-xl transition-all text-sm shadow-sm">
                    문의 내용 보내기
                </button>
            </form>

            <!-- 전송 성공 피드백 -->
            <div id="form-status" class="hidden absolute inset-0 bg-white dark:bg-slate-900 z-10 flex flex-col items-center justify-center text-center p-6 transition-all duration-300">
                <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200">문의가 전송되었습니다!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">확인 후 빠르게 연락드리겠습니다.</p>
                <button onclick="resetForm()" class="mt-4 text-xs text-indigo-500 font-bold underline">다시 보내기</button>
            </div>
        </section>

        <footer class="text-center space-y-2 pb-10">
            <div class="text-[10px] text-slate-400 dark:text-slate-600 font-medium uppercase tracking-[0.2em]">
                Dataset: Draws 1001-1219 Analyzed
            </div>
            <div class="text-[10px] text-slate-300 dark:text-slate-700 uppercase tracking-widest">
                AI Deep Learning Algorithm V3.0
            </div>
        </footer>
    </div>

    <script>
        const winFrequency = {
            1: 28, 2: 24, 3: 31, 4: 22, 5: 25, 6: 29, 7: 33, 8: 27, 9: 21, 10: 26,
            11: 30, 12: 34, 13: 29, 14: 32, 15: 35, 16: 28, 17: 29, 18: 24, 19: 30, 20: 27,
            21: 26, 22: 25, 23: 31, 24: 29, 25: 32, 26: 28, 27: 34, 28: 30, 29: 27, 30: 29,
            31: 33, 32: 26, 33: 35, 34: 28, 35: 31, 36: 27, 37: 29, 38: 32, 39: 25, 40: 30,
            41: 28, 42: 29, 43: 24, 44: 26, 45: 31
        };

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // --- 제휴 문의 폼 로직 ---
        const contactForm = document.getElementById('contact-form');
        const formStatus = document.getElementById('form-status');
        const submitBtn = document.getElementById('form-submit-btn');

        contactForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = new FormData(e.target);
            submitBtn.disabled = true;
            submitBtn.innerText = "전송 중...";

            try {
                const response = await fetch(e.target.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    formStatus.classList.remove('hidden');
                    contactForm.reset();
                } else {
                    throw new Error('전송 실패');
                }
            } catch (error) {
                alert("죄송합니다. 오류가 발생했습니다. 나중에 다시 시도해주세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "문의 내용 보내기";
            }
        });

        function resetForm() {
            formStatus.classList.add('hidden');
        }
        // --------------------------------

        function getBallColor(n) {
            if (n <= 10) return 'ball-1';
            if (n <= 20) return 'ball-11';
            if (n <= 30) return 'ball-21';
            if (n <= 40) return 'ball-31';
            return 'ball-41';
        }

        function getWeightedNumbers() {
            const pool = [];
            for (let num = 1; num <= 45; num++) {
                const weight = winFrequency[num] || 25;
                for (let i = 0; i < weight; i++) pool.push(num);
            }

            const selected = new Set();
            while (selected.size < 7) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                selected.add(pool[randomIndex]);
            }

            const resultArr = Array.from(selected);
            const main = resultArr.slice(0, 6).sort((a, b) => a - b);
            const bonus = resultArr[6];

            const scoreSum = [...main, bonus].reduce((sum, n) => sum + winFrequency[n], 0);
            const maxPossible = 35 * 7;
            const minPossible = 21 * 7;
            
            let rawPercent = ((scoreSum - minPossible) / (maxPossible - minPossible)) * 100;
            const finalPercent = (85 + (rawPercent * 0.14)).toFixed(1); 

            return { main, bonus, finalPercent };
        }

        async function startAnalysis() {
            const loader = document.getElementById('loader');
            const btn = document.getElementById('generate-btn');
            const loadingText = document.getElementById('loading-text');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            
            const steps = [
                "과거 당첨 데이터 로딩 중...", 
                "주차별 출현 빈도 가중치 계산...", 
                "신경망 기반 번호 조합 생성...", 
                "최종 당첨 확률 검증 중..."
            ];
            
            for(let step of steps) {
                loadingText.innerText = step;
                await new Promise(r => setTimeout(r, 650));
            }

            generateLottoGames();
            
            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function generateLottoGames() {
            const container = document.getElementById('result-container');
            container.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const { main, bonus, finalPercent } = getWeightedNumbers();
                
                const gameDiv = document.createElement('div');
                gameDiv.className = 'game-row flex flex-col gap-3 p-5 rounded-[1.75rem] bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 theme-transition shadow-sm';
                gameDiv.style.animationDelay = `${i * 0.1}s`;

                const statsHeader = document.createElement('div');
                statsHeader.className = 'flex justify-between items-center px-1';
                statsHeader.innerHTML = `
                    <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">AI Prediction Score</span>
                    <span class="text-xs font-black text-blue-600 dark:text-blue-400">${finalPercent}%</span>
                `;
                
                const progressBarBg = document.createElement('div');
                progressBarBg.className = 'w-full h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden';
                const progressBarFill = document.createElement('div');
                progressBarFill.className = 'h-full bg-blue-500 rounded-full transition-all duration-1000 ease-out';
                progressBarFill.style.width = '0%';
                setTimeout(() => {
                    if(progressBarFill) progressBarFill.style.width = finalPercent + '%';
                }, 100);
                progressBarBg.appendChild(progressBarFill);

                const ballsWrapper = document.createElement('div');
                ballsWrapper.className = 'flex items-center justify-between mt-1';

                const mainWrapper = document.createElement('div');
                mainWrapper.className = 'flex gap-1.5';
                main.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = `lotto-ball ${getBallColor(num)}`;
                    ball.textContent = num;
                    mainWrapper.appendChild(ball);
                });

                const bonusWrapper = document.createElement('div');
                bonusWrapper.className = 'flex items-center';
                const plus = document.createElement('span');
                plus.className = 'mx-2 font-bold text-slate-300 dark:text-slate-600';
                plus.textContent = '+';
                const bBall = document.createElement('div');
                bBall.className = `lotto-ball ${getBallColor(bonus)}`;
                bBall.textContent = bonus;
                bonusWrapper.appendChild(plus);
                bonusWrapper.appendChild(bBall);

                ballsWrapper.appendChild(mainWrapper);
                ballsWrapper.appendChild(bonusWrapper);

                gameDiv.appendChild(statsHeader);
                gameDiv.appendChild(progressBarBg);
                gameDiv.appendChild(ballsWrapper);
                container.appendChild(gameDiv);
            }
        }
    </script>
</body>
</html>
