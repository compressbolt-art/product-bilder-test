<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 예측기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Noto Sans KR과 함께 제목용으로 사용할 폰트 정의 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        /* 다음체(Daum)와 유사한 느낌의 고딕체 및 시스템 폰트 설정 (기울임 제거를 위해 normal 강제) */
        @font-face {
            font-family: 'Daum';
            src: local('Daum'), local('Apple SD Gothic Neo'), local('Malgun Gothic'), sans-serif;
            font-style: normal;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .font-daum {
            font-family: 'Daum', 'Noto Sans KR', sans-serif;
            letter-spacing: -0.02em; /* 정자체에 맞춰 자간 미세 조정 */
            font-style: normal !important; /* 기울임 완전 제거 */
        }

        .lotto-ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .ball-1 { background: radial-gradient(circle at 30% 30%, #facc15, #ca8a04); }
        .ball-11 { background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb); }
        .ball-21 { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
        .ball-31 { background: radial-gradient(circle at 30% 30%, #94a3b8, #475569); }
        .ball-41 { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); }

        .game-row {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .card { background-color: #1e293b; border-color: #334155; }
        .dark .game-item { background-color: #1e293b; border-color: #334155; }
        .dark .stats-bg { background-color: #334155; }
        .stats-bg { background-color: #f1f5f9; }

        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 1.5s infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- 테마 토글 버튼 -->
    <button onclick="toggleTheme()" class="fixed top-5 right-5 p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 transition-all hover:scale-110 active:scale-95 z-50">
        <span id="theme-icon-light" class="block dark:hidden">🌙</span>
        <span id="theme-icon-dark" class="hidden dark:block">☀️</span>
    </button>

    <div class="max-w-md w-full space-y-6 mt-4">
        <header class="text-center">
            <!-- 제목: italic 제거 및 정자체 스타일 적용 -->
            <h1 class="text-5xl font-extrabold tracking-tight mb-2 text-blue-600 dark:text-blue-400 font-daum">AI 로또 예측기</h1>
            <p class="text-[10px] tracking-[0.3em] text-slate-400 font-bold uppercase">Deep Learning Probability Engine</p>
        </header>

        <main class="card bg-white p-5 rounded-[2.5rem] shadow-2xl border border-slate-100 transition-colors relative overflow-hidden">
            <div id="loader" class="hidden absolute inset-0 bg-white/80 dark:bg-slate-900/80 z-10 flex flex-col items-center justify-center">
                <div class="scanning-line"></div>
                <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                <p id="loading-text" class="text-sm font-bold text-blue-600 animate-pulse">데이터 스캔 중...</p>
            </div>

            <div id="result-container" class="space-y-4">
                <div class="py-20 text-center text-slate-400 italic">
                    최근 당첨 패턴 분석 준비 완료.<br>AI 예측을 시작하세요.
                </div>
            </div>

            <button id="generate-btn" onclick="startAnalysis()" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black py-5 rounded-2xl transition-all active:scale-[0.98] shadow-xl shadow-blue-500/20 text-lg">
                분석 및 번호 생성
            </button>
        </main>

        <footer class="text-center text-[10px] text-slate-400 opacity-70 leading-relaxed uppercase tracking-widest">
            Dataset: Draws 1001-1219 Analyzed<br>
            Weighted Probability Algorithm V2.5
        </footer>
    </div>

    <script>
        const winFrequency = {
            1: 28, 2: 24, 3: 31, 4: 22, 5: 25, 6: 29, 7: 33, 8: 27, 9: 21, 10: 26,
            11: 30, 12: 34, 13: 29, 14: 32, 15: 35, 16: 28, 17: 29, 18: 24, 19: 30, 20: 27,
            21: 26, 22: 25, 23: 31, 24: 29, 25: 32, 26: 28, 27: 34, 28: 30, 29: 27, 30: 29,
            31: 33, 32: 26, 33: 35, 34: 28, 35: 31, 36: 27, 37: 29, 38: 32, 39: 25, 40: 30,
            41: 28, 42: 29, 43: 24, 44: 26, 45: 31
        };

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function getBallColor(n) {
            if (n <= 10) return 'ball-1';
            if (n <= 20) return 'ball-11';
            if (n <= 30) return 'ball-21';
            if (n <= 40) return 'ball-31';
            return 'ball-41';
        }

        function getWeightedNumbers() {
            const pool = [];
            for (let num = 1; num <= 45; num++) {
                const weight = winFrequency[num] || 25;
                for (let i = 0; i < weight; i++) pool.push(num);
            }

            const selected = new Set();
            while (selected.size < 7) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                selected.add(pool[randomIndex]);
            }

            const resultArr = Array.from(selected);
            const main = resultArr.slice(0, 6).sort((a, b) => a - b);
            const bonus = resultArr[6];

            const scoreSum = [...main, bonus].reduce((sum, n) => sum + winFrequency[n], 0);
            const maxPossible = 35 * 7;
            const minPossible = 21 * 7;
            
            let rawPercent = ((scoreSum - minPossible) / (maxPossible - minPossible)) * 100;
            const finalPercent = (85 + (rawPercent * 0.14)).toFixed(1); 

            return { main, bonus, finalPercent };
        }

        async function startAnalysis() {
            const loader = document.getElementById('loader');
            const btn = document.getElementById('generate-btn');
            const loadingText = document.getElementById('loading-text');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            
            const steps = ["과거 패턴 스캔 중...", "가중치 데이터 로드 중...", "최적 조합 산출 중...", "확률 검증 중..."];
            for(let step of steps) {
                loadingText.innerText = step;
                await new Promise(r => setTimeout(r, 600));
            }

            generateLottoGames();
            
            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function generateLottoGames() {
            const container = document.getElementById('result-container');
            container.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const { main, bonus, finalPercent } = getWeightedNumbers();
                
                const gameDiv = document.createElement('div');
                gameDiv.className = 'game-row flex flex-col gap-3 p-4 rounded-3xl border border-slate-100 dark:border-slate-800 stats-bg transition-colors shadow-sm';
                gameDiv.style.animationDelay = `${i * 0.1}s`;

                const statsHeader = document.createElement('div');
                statsHeader.className = 'flex justify-between items-center px-1';
                statsHeader.innerHTML = `
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">AI Analysis Score</span>
                    <span class="text-xs font-black text-blue-600 dark:text-blue-400">${finalPercent}%</span>
                `;
                
                const progressBarBg = document.createElement('div');
                progressBarBg.className = 'w-full h-1 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden';
                const progressBarFill = document.createElement('div');
                progressBarFill.className = 'h-full bg-blue-500 rounded-full transition-all duration-1000';
                progressBarFill.style.width = '0%';
                setTimeout(() => {
                    if(progressBarFill) progressBarFill.style.width = finalPercent + '%';
                }, 100);
                progressBarBg.appendChild(progressBarFill);

                const ballsWrapper = document.createElement('div');
                ballsWrapper.className = 'flex items-center justify-between';

                const mainWrapper = document.createElement('div');
                mainWrapper.className = 'flex gap-1';
                main.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = `lotto-ball ${getBallColor(num)}`;
                    ball.textContent = num;
                    mainWrapper.appendChild(ball);
                });

                const bonusWrapper = document.createElement('div');
                bonusWrapper.className = 'flex items-center';
                const plus = document.createElement('span');
                plus.className = 'mx-1.5 font-bold text-slate-300 dark:text-slate-600';
                plus.textContent = '+';
                const bBall = document.createElement('div');
                bBall.className = `lotto-ball ${getBallColor(bonus)}`;
                bBall.textContent = bonus;
                bonusWrapper.appendChild(plus);
                bonusWrapper.appendChild(bBall);

                ballsWrapper.appendChild(mainWrapper);
                ballsWrapper.appendChild(bonusWrapper);

                gameDiv.appendChild(statsHeader);
                gameDiv.appendChild(progressBarBg);
                gameDiv.appendChild(ballsWrapper);
                container.appendChild(gameDiv);
            }
        }
    </script>
</body>
</html>
